<nav class="fixed top-0 w-full z-50 px-3 md:px-6 py-4">
  <div class="max-w-7xl mx-auto glass-card rounded-2xl px-4 md:px-6 py-3 flex items-center justify-between">
    
    <div class="flex items-center gap-8">
      <span routerLink="/" class="text-xl md:text-2xl font-black gradient-text cursor-pointer">House Padi</span>
      
      <div class="hidden lg:flex items-center gap-6 text-sm font-medium text-slate-500 dark:text-slate-400">
        <a routerLink="/discover" class="hover:text-brand-primary transition-colors">Rent</a>
        <a href="#" class="hover:text-brand-primary transition-colors">Shortlet</a>

      } @else {
        <div class="flex items-center gap-2">
          <div class="glass-card flex items-center gap-3 px-3 py-1.5 rounded-xl border-none">
            <div class="w-7 h-7 rounded-lg bg-brand-primary/20 flex items-center justify-center text-brand-primary font-black text-xs uppercase">
              {{ displayName()[0] }}
            </div>
            
            <div class="hidden md:block text-left mr-2">
              <p class="text-[10px] font-black uppercase tracking-tighter text-brand-primary leading-none">Welcome</p>
              <p class="text-xs font-bold text-slate-900 dark:text-white capitalize leading-tight">
                {{ displayName() }}
              </p>
            </div>
          </div>

          <button (click)="onLogout()" 
            title="Logout"
            class="p-2.5 glass-card rounded-xl border-none text-slate-400 hover:text-red-500 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
