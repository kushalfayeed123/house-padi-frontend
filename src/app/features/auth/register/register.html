<div class="min-h-screen transition-colors duration-500 bg-transparent relative overflow-hidden">
  <div class="hero-glow"></div>

  <div class="flex items-center justify-center min-h-screen p-6 pt-24">
    <div class="w-full max-w-lg glass-card rounded-[2.5rem] p-8 md:p-12 animate-in">

      <div class="text-center mb-8">
        <div class="tech-badge mx-auto mb-4 scale-90">Secure Onboarding</div>
        <h1 class="text-4xl font-black text-slate-900 dark:text-white tracking-tight">
          Join <span class="gradient-text">House Padi</span>
        </h1>
      </div>

      <div class="flex gap-2 p-1.5 bg-slate-200/30 dark:bg-white/5 rounded-2xl mb-8 border border-white/10">
        <button type="button" (click)="setRole('renter')"
          [class]="role() === 'renter' ? 'bg-brand-primary text-white shadow-lg' : 'text-slate-500 dark:text-slate-400'"
          class="flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all duration-300">
          Find a Home
        </button>
        <button type="button" (click)="setRole('owner')"
          [class]="role() === 'owner' ? 'bg-brand-primary text-white shadow-lg' : 'text-slate-500 dark:text-slate-400'"
          class="flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all duration-300">
          List Property
        </button>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-brand-primary uppercase ml-1">First Name</label>
            <div class="glass-card !bg-white/50 dark:!bg-white/5 border-none p-1 rounded-2xl">
              <input formControlName="firstName" type="text"
                class="w-full bg-transparent outline-none px-4 py-3 text-sm font-bold" placeholder="Firstname">
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-black text-brand-primary uppercase ml-1">Last Name</label>
            <div class="glass-card !bg-white/50 dark:!bg-white/5 border-none p-1 rounded-2xl">
              <input formControlName="lastName" type="text"
                class="w-full bg-transparent outline-none px-4 py-3 text-sm font-bold" placeholder="Lastname">
            </div>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-black text-brand-primary uppercase ml-1">Email</label>
          <div class="glass-card bg-white/50! dark:bg-white/5! border-none p-1 rounded-2xl">
            <input formControlName="email" type="email"
              class="w-full bg-transparent outline-none px-4 py-3 text-sm font-bold" placeholder="padi@example.com">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-black text-brand-primary uppercase ml-1">Password</label>
          <div class="glass-card bg-white/50! dark:bg-white/5! border-none p-1 rounded-2xl">
            <input formControlName="password" type="password"
              class="w-full bg-transparent outline-none px-4 py-3 text-sm font-bold" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" [disabled]="registerForm.invalid || authStore.isLoading()"
          class="w-full bg-brand-primary text-white py-4 rounded-2xl font-black shadow-lg hover:scale-[1.02] transition-all disabled:opacity-50 mt-4">
          {{ authStore.isLoading() ? 'Creating...' : 'Get Started' }}
        </button>

        <p class="text-center text-slate-500 text-sm mt-6 font-medium">
          Already a have an account? <a [routerLink]="['/auth/login']" [queryParams]="{ returnUrl: returnUrl }"
            class="text-brand-primary font-bold">
            Login here
          </a>
        </p>
      </form>
    </div>
  </div>
</div>
