<div class="glass-card p-7 rounded-[2.5rem] flex items-center justify-between group transition-all hover:scale-[1.02]">
  <div class="space-y-1">
    <p class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">{{ title() }}</p>
    <h3 class="text-3xl font-black text-slate-900 dark:text-white tracking-tighter transition-colors">
      {{ value() }}
    </h3>
  </div>
  <div class="w-14 h-14 rounded-2xl bg-brand-primary/10 flex items-center justify-center text-brand-primary group-hover:bg-brand-primary group-hover:text-white transition-all duration-500">
    <span class="material-symbols-outlined text-2xl font-bold">{{ icon() }}</span>
  </div>
</div>
